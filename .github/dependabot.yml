version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # The RustCrypto / RNG stack is tightly version-coupled: a single-crate
      # major bump breaks compilation, and moving the whole stack to new majors
      # is a coordinated API migration, not an automated bump (tracked in
      # ROADMAP Deferred). Keep minor/patch security updates; skip majors here.
      - dependency-name: "x25519-dalek"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ed25519-dalek"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chacha20poly1305"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sha2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hkdf"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rand_core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rand_chacha"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # dtolnay/rust-toolchain encodes the toolchain in the pinned ref, so ANY
      # automated ref update can silently change the toolchain a workflow
      # installs (PR #99 replaced the fuzz workflow's nightly pin with the
      # 1.96.1 branch head). Toolchain pins are bumped intentionally, by hand.
      - dependency-name: "dtolnay/rust-toolchain"
