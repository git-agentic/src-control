name: audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    # Daily: the advisory database is deliberately fetched live each run, so
    # newly published RustSec advisories flag here without any code change.
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  # Scheduled runs file findings as GitHub issues; without this the action
  # fails with "Resource not accessible by integration" after a clean audit.
  issues: write

jobs:
  audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # proc-macro-error2 (unmaintained) reaches the lockfile only via
          # gix -> gix-date -> jiff -> defmt, an optional jiff feature we never
          # compile; unactionable here until upstream migrates off it.
          ignore: RUSTSEC-2026-0173
