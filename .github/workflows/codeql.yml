name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # The vendored glib source is third-party code, byte-identical to the
          # published crate except for the documented soundness backport and
          # lint cap. Its upstream FFI triggers false-positive pointer alerts.
          config: |
            paths-ignore:
              - vendor/glib-0.18.5-patched/**
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
